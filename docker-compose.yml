services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: frontlens-clickhouse
    ports:
      - "8123:8123" # HTTP interface (used by @clickhouse/client)
      - "9000:9000" # native protocol
    environment:
      CLICKHOUSE_DB: afd
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: frontlens
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  clickhouse-data:
